<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>TaskFlow — Personal Task Manager</title>
    <meta name="description" content="A beautifully crafted personal task manager built with Flutter, Node.js, and MongoDB. Stay focused, prioritize what matters, and get more done." />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Critical image preloads — browser fetches these before JS runs -->
    <link rel="preload" as="image" href="/logo.png" />
    <link rel="preload" as="image" href="/framed/s2.png" />
    <link rel="preload" as="image" href="/framed/s1.png" />

    <!-- Lower-priority prefetch for remaining screenshots -->
    <link rel="prefetch" href="/framed/s3.png" />
    <link rel="prefetch" href="/framed/s4.png" />
    <link rel="prefetch" href="/framed/s5.png" />
    <link rel="prefetch" href="/framed/s6.png" />

    <!-- Cache hints (Vercel will honour these headers) -->
    <meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
